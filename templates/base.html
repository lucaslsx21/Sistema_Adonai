{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Adonai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body>

    <div class="d-flex">

        <aside class="sidebar">
            <h4 class="text-white mb-4">Adonai</h4>

            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'doadores' %}">Doadores</a>
            <a href="{% url 'produtos' %}">Produtos</a>
            <a href="{% url 'doacoes' %}">Doações</a>
            <a href="{% url 'estoque' %}">Estoque</a>
            <a href="{% url 'campanhas' %}">Campanhas</a>
            <a href="{% url 'beneficiarios' %}">Beneficiários</a>
            <a href="{% url 'coletas' %}">Coletas</a>
            <a href="{% url 'entregas' %}">Entregas</a>
            <a href="{% url 'relatorios' %}">Relatórios</a>

            <hr class="text-white">

            <a href="{% url 'logout' %}">Sair</a>
        </aside>

        <main class="content">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% block content %}
            {% endblock %}
        </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
