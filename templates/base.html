{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Adonai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #eef8ff, #eaf7ff);
            color: #111;
        }

        .layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 290px;
            padding: 25px 20px;
        }

        .logo {
            color: #0d6efd;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .menu {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 20px;
            color: #0d6efd;
            text-decoration: none;
            font-size: 18px;
            border-bottom: 1px solid #eee;
        }

        .menu a:last-child {
            border-bottom: none;
        }

        .menu a i {
            width: 25px;
            text-align: center;
        }

        .menu a:hover,
        .menu a.active {
            background: #0d6efd;
            color: white;
        }

        .menu a.sair {
            color: #dc3545;
        }

        .menu a.sair:hover {
            background: #dc3545;
            color: white;
        }

        .content {
            flex: 1;
            padding: 18px 45px;
        }

        h1 {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            margin: 20px 0 25px;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
        }

        .btn-primary-custom {
            background: #0d6efd;
            color: white;
            padding: 13px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            border: none;
        }

        .btn-primary-custom:hover {
            background: #0b5ed7;
            color: white;
        }

        .card {
            background: white;
            border: 1px solid #d8d8d8;
            border-radius: 7px;
            margin-bottom: 28px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        .card-header {
            background: #fafafa;
            border-bottom: 1px solid #ddd;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: 400;
        }

        .card-body {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 17px;
        }

        th {
            font-weight: 700;
        }

        .badge-baixo {
            background: #dc3545;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .alert {
            margin-top: 15px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <div class="logo">Sistema Adonai</div>

            <nav class="menu">
                <a href="{% url 'dashboard' %}"
                    class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>

                <a href="{% url 'doadores' %}"
                    class="{% if request.resolver_match.url_name == 'doadores' %}active{% endif %}">
                    <i class="fa-solid fa-users"></i> Doadores
                </a>

                <a href="{% url 'produtos' %}"
                    class="{% if request.resolver_match.url_name == 'produtos' %}active{% endif %}">
                    <i class="fa-solid fa-box"></i> Produtos
                </a>

                <a href="{% url 'doacoes' %}"
                    class="{% if request.resolver_match.url_name == 'doacoes' %}active{% endif %}">
                    <i class="fa-solid fa-gift"></i> Doações
                </a>

                <a href="{% url 'estoque' %}"
                    class="{% if request.resolver_match.url_name == 'estoque' %}active{% endif %}">
                    <i class="fa-solid fa-cube"></i> Estoque
                </a>

                <a href="{% url 'campanhas' %}"
                    class="{% if request.resolver_match.url_name == 'campanhas' %}active{% endif %}">
                    <i class="fa-solid fa-bullhorn"></i> Campanhas
                </a>

                <a href="{% url 'beneficiarios' %}"
                    class="{% if request.resolver_match.url_name == 'beneficiarios' %}active{% endif %}">
                    <i class="fa-solid fa-user-check"></i> Beneficiários
                </a>

                <a href="{% url 'coletas' %}"
                    class="{% if request.resolver_match.url_name == 'coletas' %}active{% endif %}">
                    <i class="fa-solid fa-truck"></i> Coletas
                </a>

                <a href="{% url 'entregas' %}"
                    class="{% if request.resolver_match.url_name == 'entregas' %}active{% endif %}">
                    <i class="fa-solid fa-box-open"></i> Entregas
                </a>

                <a href="{% url 'relatorios' %}"
                    class="{% if request.resolver_match.url_name == 'relatorios' %}active{% endif %}">
                    <i class="fa-solid fa-chart-column"></i> Relatórios
                </a>

                <a href="{% url 'logout' %}" class="sair">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </a>
            </nav>
        </aside>

        <main class="content">

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
