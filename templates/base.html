{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Adonai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <div class="logo">Sistema Adonai</div>

            <nav class="menu">
                <a href="{% url 'dashboard' %}"
                    class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>

                <a href="{% url 'doadores' %}"
                    class="{% if request.resolver_match.url_name == 'doadores' %}active{% endif %}">
                    <i class="fa-solid fa-users"></i> Doadores
                </a>

                <a href="{% url 'produtos' %}"
                    class="{% if request.resolver_match.url_name == 'produtos' %}active{% endif %}">
                    <i class="fa-solid fa-box"></i> Produtos
                </a>

                <a href="{% url 'doacoes' %}"
                    class="{% if request.resolver_match.url_name == 'doacoes' %}active{% endif %}">
                    <i class="fa-solid fa-gift"></i> Doações
                </a>

                <a href="{% url 'estoque' %}"
                    class="{% if request.resolver_match.url_name == 'estoque' %}active{% endif %}">
                    <i class="fa-solid fa-cube"></i> Estoque
                </a>

                <a href="{% url 'campanhas' %}"
                    class="{% if request.resolver_match.url_name == 'campanhas' %}active{% endif %}">
                    <i class="fa-solid fa-bullhorn"></i> Campanhas
                </a>

                <a href="{% url 'beneficiarios' %}"
                    class="{% if request.resolver_match.url_name == 'beneficiarios' %}active{% endif %}">
                    <i class="fa-solid fa-user-check"></i> Beneficiários
                </a>

                <a href="{% url 'coletas' %}"
                    class="{% if request.resolver_match.url_name == 'coletas' %}active{% endif %}">
                    <i class="fa-solid fa-truck"></i> Coletas
                </a>

                <a href="{% url 'entregas' %}"
                    class="{% if request.resolver_match.url_name == 'entregas' %}active{% endif %}">
                    <i class="fa-solid fa-box-open"></i> Entregas
                </a>

                <a href="{% url 'relatorios' %}"
                    class="{% if request.resolver_match.url_name == 'relatorios' %}active{% endif %}">
                    <i class="fa-solid fa-chart-column"></i> Relatórios
                </a>

                <a href="{% url 'importar_documentos' %}"
                    class="{% if request.resolver_match.url_name == 'importar_documentos' %}active{% endif %}">
                    <i class="fa-solid fa-file-import"></i> Importar Documentos
                </a>

                <a href="{% url 'logout' %}" class="sair">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </a>
            </nav>
        </aside>

        <main class="content">

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
